name: release

# Build prebuilt jupynvim-core binaries for every tag push.
# The lua/jupynvim/install.lua module downloads these so users don't
# need a Rust toolchain locally.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: build
        working-directory: core
        run: cargo build --release --target ${{ matrix.target }}

      - name: stage artifact
        run: |
          mkdir -p dist
          cp core/target/${{ matrix.target }}/release/jupynvim-core dist/jupynvim-core-${{ matrix.target }}
          strip dist/jupynvim-core-${{ matrix.target }} || true
          ls -lah dist/

      - uses: actions/upload-artifact@v4
        with:
          name: jupynvim-core-${{ matrix.target }}
          path: dist/jupynvim-core-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list artifacts
        run: ls -lah artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
